# Hercules configuration template for Z-Optima RL
#
# Placeholders substituted at runtime:
#   {{MVS_PATH}}  — path to TK5 root (pre-substituted by RealHerculesRunner)
#   {{WORKDIR}}   — per-slot temp directory (substituted by HerculesPool)
#   {{CNSLPORT}}  — console port
#   {{HTTPPORT}}  — HTTP API port
#
# Layout matches MVS TK5 (Rob Prins). Run boot_check.py first to confirm
# JES2 is active before using RealHerculesRunner.

ARCHLVL   S/370
CPUSERIAL 000611
CPUMODEL  3033
MAINSIZE  16
XPNDSIZE  0
NUMCPU    1
MAXCPU    1
CNSLPORT  {{CNSLPORT}}
LPARNAME  ZOPTIMA

SYSEPOCH  1900
TZOFFSET  +0000

# HTTP console — used for shadow DASD reset (DETACH/ATTACH)
HTTPPORT  {{HTTPPORT}} noauth

# IPL from TK5 system residence pack (device 0390)
IPLDEV    0390

# ── TK5 DASD volumes ────────────────────────────────────────────────────────

# System residence (MVS OS)
0390  3390  {{MVS_PATH}}/dasd/tk5res.390  cu=3990

# Catalog + DLB
0391  3390  {{MVS_PATH}}/dasd/tk5cat.391  cu=3990
0392  3390  {{MVS_PATH}}/dasd/tk5dlb.392  cu=3990

# Integrated catalog
0380  3380  {{MVS_PATH}}/dasd/int001.380  cu=3880

# TSO user volumes
0190  3390  {{MVS_PATH}}/dasd/tso001.190  cu=3990
0191  3390  {{MVS_PATH}}/dasd/tso002.191  cu=3990
0192  3390  {{MVS_PATH}}/dasd/tso003.192  cu=3990

# Page and spool
0248  3350  {{MVS_PATH}}/dasd/page00.248  cu=3830
0249  3350  {{MVS_PATH}}/dasd/spool0.249  cu=3830

# Work volumes
0290  3390  {{MVS_PATH}}/dasd/work01.290  cu=3990
0291  3390  {{MVS_PATH}}/dasd/work02.291  cu=3990
0292  3390  {{MVS_PATH}}/dasd/work03.292  cu=3990
0293  3390  {{MVS_PATH}}/dasd/work04.293  cu=3990

# TK5 distribution volumes
0298  3390  {{MVS_PATH}}/dasd/tk5001.298  cu=3990
0299  3390  {{MVS_PATH}}/dasd/tk5002.299  cu=3990

# ── Unit record devices ──────────────────────────────────────────────────────

# Printer output
0002  3211  {{WORKDIR}}/prt/prt002.txt  CRLF
000E  1403  {{WORKDIR}}/prt/prt00e.txt  CRLF
000F  1403  {{WORKDIR}}/prt/prt00f.txt  CRLF

# Card reader — file-based; devinit via HTTP API to submit jobs
010C  3505  {{WORKDIR}}/rdr/job.jcl  eof  ascii  trunc

# Card punch
000D  3525  {{WORKDIR}}/pch/pch00d.txt  ascii

# Tape
0480  3420  *

# ── Console ──────────────────────────────────────────────────────────────────
# External (non-interactive) console for unattended operation
0009  3215  *  noprompt
